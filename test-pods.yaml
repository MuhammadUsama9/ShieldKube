apiVersion: v1
kind: Pod
metadata:
  name: security-risk-pod
  labels:
    app: risk-test
spec:
  containers:
  - name: alpine
    image: alpine
    command: ["sleep", "3600"]
    securityContext:
      privileged: true
      allowPrivilegeEscalation: true
---
apiVersion: v1
kind: Pod
metadata:
  name: root-pod
spec:
  containers:
  - name: nginx
    image: nginx
    securityContext:
      runAsUser: 0
---
apiVersion: v1
kind: Pod
metadata:
  name: no-limits-pod
spec:
  containers:
  - name: busybox
    image: busybox
    command: ["sleep", "3600"]
    resources: {}
